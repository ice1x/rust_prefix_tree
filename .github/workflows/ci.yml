name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: fmt + clippy + test
    runs-on: macos-14 # self-hosted macOS ARM64 in prod; GitHub arm64 runner here
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --check

      # Default (Python-free) build: the primary correctness gate.
      - name: Clippy (default features)
        run: cargo clippy --all-targets -- -D warnings

      - name: Test (default features)
        run: cargo test --all-targets

      # PyO3 build must also stay lint-clean; wheels are produced by maturin.
      - name: Clippy (python feature)
        run: cargo clippy --all-targets --features python -- -D warnings

  wheel:
    name: build wheel (maturin)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build abi3 wheel
        run: |
          python -m pip install --upgrade maturin
          maturin build --release --features python --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels
          path: dist/*.whl
